<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Memes — ViralRoot</title>
  <meta name="description" content="Search for any meme, viral sound, or internet trend. Find the origin and why it went viral."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="dark-mode">
  <div class="custom-cursor" id="customCursor"></div>
  <canvas id="dustCanvas" class="dust-canvas"></canvas>
  <nav class="navbar">
    <a href="index.html" class="logo">VIRAL<span>ROOT</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="trending.html">Trending</a>
      <a href="sounds.html">Sounds</a>
      <a href="categories.html">Categories</a>
      <a href="submit.html">Submit a Meme</a>
    </div>
    <div class="nav-search">
      <input type="text" id="navSearch" placeholder="Search memes, sounds..." onkeyup="handleSearch(event)"/>
      <button onclick="goSearch()">🔍</button>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="trending.html">Trending</a>
    <a href="sounds.html">Sounds</a>
    <a href="categories.html">Categories</a>
    <a href="submit.html">Submit a Meme</a>
  </div>

  <div class="search-page">
    <h1 class="search-title">SEARCH</h1>
    <p class="search-subtitle" id="searchSubtitle">Find any meme, sound, or trend...</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="skibidi, hawk tuah, demure..." onkeyup="if(event.key==='Enter')searchFromBar()"/>
      <button onclick="searchFromBar()">SEARCH</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <footer class="footer">
    <div class="footer-top">
      <div class="footer-brand">
        <a href="index.html" class="logo">VIRAL<span>ROOT</span></a>
        <p>The internet's meme encyclopedia.</p>
      </div>
    </div>
    <div class="footer-bottom"><p>© 2024 ViralRoot</p></div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
